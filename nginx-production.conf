#upstream block
upstream nodejs_backend {
    server 127.0.0.1:4000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;

    server_name your-domain.com www.your-domain.com;

    root /var/www/abawat-maintenance;
    index dist/index.html;

    access_log /var/log/nginx/abawat-access.log;
    error_log  /var/log/nginx/abawat-error.log warn;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;
#static assets
    location ~* ^/assets/ {
        alias /var/www/abawat-maintenance/dist/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }
#health check endpoint
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "OK\n";
    }

    location ~* ^/(favicon\.ico|robots\.txt|sitemap\.xml)$ {
        root /var/www/abawat-maintenance/dist;
        expires 1d;
        access_log off;
        try_files $uri =404;
    }
#api routes
    location /api/ {
        proxy_pass http://nodejs_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
        proxy_buffering on;
        proxy_buffer_size          4k;
        proxy_buffers              8 8k;
        proxy_busy_buffers_size    16k;
        error_page 502 503 504 = @maintenance;
    }
#all other routes
    location / {
        proxy_pass http://nodejs_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
        proxy_buffering on;
        proxy_buffer_size          4k;
        proxy_buffers              8 8k;
        proxy_busy_buffers_size    16k;
        error_page 502 503 504 = @maintenance;
    }
#this runs when node is unreachable
    location @maintenance {
        root /var/www/abawat-maintenance;
        rewrite ^(.*)$ /dist/index.html break;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
    }
}